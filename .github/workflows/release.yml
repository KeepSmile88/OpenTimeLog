name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: OpenTimeLog-Linux.tar.gz
          - os: windows-latest
            artifact_name: OpenTimeLog-Windows.zip
          - os: macos-latest
            artifact_name: OpenTimeLog-macOS.zip
    runs-on: ${{ matrix.os }}
    
    # 必需的安全发布权限
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller Pillow

    - name: Install Linux specific dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-xkb1 libxkbcommon-x11-0

    - name: Build with PyInstaller
      env:
        PYTHONUTF8: "1"
      run: |
        python build.py

    - name: Package Windows
      if: runner.os == 'Windows'
      run: |
        cd dist
        # PowerShell 压缩
        Compress-Archive -Path OpenTimeLog -DestinationPath ../${{ matrix.artifact_name }}

    - name: Package macOS
      if: runner.os == 'macOS'
      run: |
        cd dist
        # macOS 压缩应用包，必须包含 -y (或 --symlinks) 以保留系统框架中的符号链接，避免体积暴增
        zip -r -y ../${{ matrix.artifact_name }} OpenTimeLog.app

    - name: Package Linux
      if: runner.os == 'Linux'
      run: |
        cd dist
        # Linux 打包成 tar.gz
        tar -czvf ../${{ matrix.artifact_name }} OpenTimeLog

    - name: Attest Build Provenance
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: '${{ matrix.artifact_name }}'

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
