name: Build & Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: OpenTimeLog-Windows
            asset_name: OpenTimeLog-Windows.zip
          - os: macos-latest
            artifact_name: OpenTimeLog-macOS
            asset_name: OpenTimeLog-macOS.zip
          - os: ubuntu-latest
            artifact_name: OpenTimeLog-Linux
            asset_name: OpenTimeLog-Linux.tar.gz

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Linux specific dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-xkb1 libxkbcommon-x11-0

    - name: Build with PyInstaller
      run: python build.py

    - name: Package Windows
      if: runner.os == 'Windows'
      run: |
        cd dist
        Compress-Archive -Path OpenTimeLog -DestinationPath ../${{ matrix.asset_name }}

    - name: Package macOS
      if: runner.os == 'macOS'
      run: |
        cd dist
        # PyInstaller creates a .app bundle on macOS
        zip -r ../${{ matrix.asset_name }} OpenTimeLog.app

    - name: Package Linux
      if: runner.os == 'Linux'
      run: |
        cd dist
        tar -czvf ../${{ matrix.asset_name }} OpenTimeLog

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v3
        with:
          name: OpenTimeLog-Windows
          
      - name: Download macOS Artifact
        uses: actions/download-artifact@v3
        with:
          name: OpenTimeLog-macOS
          
      - name: Download Linux Artifact
        uses: actions/download-artifact@v3
        with:
          name: OpenTimeLog-Linux
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            OpenTimeLog-Windows.zip
            OpenTimeLog-macOS.zip
            OpenTimeLog-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
